<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pseudo Elements Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e3f2fd;
}

.card{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    position:relative;
}

/* Decorative Circle */
.card::before{
    content:"";
    width:80px;
    height:80px;
    background:#2196f3;
    border-radius:50%;
    position:absolute;
    top:-30px;
    right:-30px;
}

/* Decorative Line */
.card::after{
    content:"";
    width:100%;
    height:5px;
    background:#2196f3;
    position:absolute;
    bottom:0;
    left:0;
}

h2{
    margin-bottom:15px;
}

p{
    line-height:1.6;
    margin-bottom:20px;
}

/* First Letter */
p::first-letter{
    font-size:40px;
    color:#2196f3;
    font-weight:bold;
}

/* Selected Text */
::selection{
    background:black;
    color:white;
}

/* Placeholder */
input{
    width:100%;
    padding:10px;
    border:2px solid #2196f3;
    border-radius:5px;
}

input::placeholder{
    color:gray;
    font-style:italic;
}
</style>

</head>
<body>

<div class="card">
    <h2>Welcome</h2>

    <p>
        Learning CSS pseudo-elements makes web pages more attractive
        without adding extra HTML elements.
    </p>

    <input type="text" placeholder="Enter your email">
</div>

</body>
</html>

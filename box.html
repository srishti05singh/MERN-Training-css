<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position & Variables Example</title>
  <link rel="stylesheet" href="box.css">
</head>
<body>
  <div class="parent">
    <div class="box static">Box-1</div>
    <div class="box relative">Box-2</div>
    <div class="box absolute">Box-3</div>
    <div class="box fixed">Box-4</div>
    <div class="box sticky">Box-5</div>
  </div>
</body>
</html>

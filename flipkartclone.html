<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>

    <link rel="stylesheet" href="flipkartclone.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<!-- ================= HEADER ================= -->

<header>

    <div class="top-navbar">

        <div class="logo">
            <img src="https://static.vecteezy.com/system/resources/previews/054/650/802/non_2x/flipkart-logo-rounded-flipkart-logo-free-download-flipkart-logo-free-png.png">
        </div>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>

            <input
            type="text"
            placeholder="Search for Products, Brands and More">
        </div>

        <button class="login-btn">
            <i class="fa-regular fa-user"></i>
            Login
        </button>

        <div class="nav-item">
            <i class="fa-solid fa-cart-shopping"></i>
            Cart
        </div>

        <div class="nav-item">
            <i class="fa-solid fa-store"></i>
            Become a Seller
        </div>

    </div>

</header>

<!-- ================= CATEGORIES ================= -->

<section class="categories">

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/29327f40e9c4d26b.png">
<p>Grocery</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/22fddf3c7da4c4f4.png">
<p>Mobiles</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/0d75b34f7d8fbcb3.png">
<p>Fashion</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/69c6589653afdb9a.png">
<p>Electronics</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/ab7e2b022a4587dd.jpg">
<p>Home</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/0139228b2f7eb413.jpg">
<p>Appliances</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/71050627a56b4693.png">
<p>Travel</p>
</div>

<div class="category">
<img src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/dff3f7adcf3a90c6.png">
<p>Beauty</p>
</div>

</section>

<!-- ================= HERO ================= -->

<section class="hero">

<img src="https://rukminim2.flixcart.com/fk-p-flap/1600/270/image/b9cc01fdaedbf5d9.png?q=20">

</section>

<!-- ================= PRODUCTS ================= -->

<section class="products">

<h2>Best Deals</h2>

<div class="product-container">

<div class="card">
<img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/k/u/3/-original-imah4zp8tfhfmpfh.jpeg?q=70">
<h3>iPhone 15</h3>
<p>From ₹58,999</p>
</div>

<div class="card">
<img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/y/1/w/-original-imah4jyfrgsbebg9.jpeg?q=70">
<h3>Samsung S25</h3>
<p>From ₹72,999</p>
</div>

<div class="card">
<img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/4/5/r/-original-imah4k39kgfkgqhc.jpeg?q=70">
<h3>OnePlus</h3>
<p>From ₹32,999</p>
</div>

<div class="card">
<img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/7/p/i/-original-imah3xk892aj9hxh.jpeg?q=70">
<h3>Motorola</h3>
<p>From ₹18,999</p>
</div>

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

<h3>Flipkart Clone</h3>

<p>© 2026 Flipkart Clone | HTML & CSS Only</p>

</footer>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AB Roll</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 500px;
      background-color: #eee;
      padding: 20px;
      border: 2px solid #000;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #555;
      margin-bottom: 20px;
      background-color: white;
    }

    .card-header {
      padding: 10px;
      font-weight: bold;
      text-align: center;
      color: white;
    }

    .purple {
      background-color: purple;
    }

    .yellow {
      background-color: gold;
      color: black;
    }

    .green {
      background-color: green;
    }

    .card-body {
      padding: 15px;
    }

    .card-body p {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sri Cafe Menu</h1>

    <div class="card">
      <div class="card-header purple">Drinks</div>
      <div class="card-body">
        <p>Coffee $10</p>
        <p>Tea $5</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header yellow">Snacks</div>
      <div class="card-body">
        <p>French Fries $40</p>
        <p>Samosa $30</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header green">Proper Food</div>
      <div class="card-body">
        <p>Chicken Biryani &60</p>
        <p>Mutton Rice $100</p>
      </div>
    </div>

  </div>

</body>
</html>

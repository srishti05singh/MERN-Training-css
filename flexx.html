<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.navbar{
    background:#dff7ef;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:black;
}

.hero{
    flex:1;
    background:#222;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    margin-bottom:20px;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    padding:10px 20px;
    border:none;
    background:lightgreen;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>
<body>

<nav class="navbar">
    <div class="study point">Study Point</div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Course</a></li>
        <li><a href="#">Service</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>Welcome to the website</h1>
    <p>Enroll for the course according to your intrest. We provide lots of courses in budget</p>

</section>

</body>
</html>

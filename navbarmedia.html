<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navbar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background-color:#222;
    padding:20px 50px;
    transition:0.5s;
}

.logo{
    color:white;
    text-decoration:none;
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:30px;
}

.nav-links li a{
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.nav-links li a:hover{
    color:yellow;
}

@media screen and (min-width:601px) and (max-width:992px){

    .navbar{
        background-color:green;
        padding:20px 30px;
    }

    .nav-links{
        gap:20px;
    }

    .nav-links li a{
        font-size:16px;
    }
}

@media screen and (max-width:600px){

    .navbar{
        flex-direction:column;
        gap:20px;
        padding:20px;
        background-color:royalblue;
    }

    .nav-links{
        flex-direction:column;
        align-items:center;
        gap:15px;
    }

    .nav-links li a{
        font-size:18px;
    }
}
</style>

</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">MyLogo</a>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Help & Support</a></li>
    </ul>
</nav>

</body>
</html>

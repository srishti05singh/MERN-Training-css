<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Clone</title>
  <link rel="stylesheet" href="youtube.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">

    <div class="menu">
      ☰
    </div>

    <div class="logo">
      YouTube
    </div>

    <div class="search-bar">
      <input type="text" placeholder="Search">
    </div>

  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="item">🏠 Home</div>
    <div class="item">🎬 Shorts</div>
    <div class="item">📺 Subscriptions</div>
    <div class="item">📚 Library</div>

  </div>

  <!-- Main -->
  <div class="main">

    <!-- Categories -->
    <div class="categories">

      <button>All</button>
      <button>Music</button>
      <button>Gaming</button>
      <button>Live</button>
      <button>News</button>

    </div>

    <!-- Videos -->
    <div class="videos">

      <div class="card">
        <img src="https://picsum.photos/300/180?1">
        <h3>Nature Facts</h3>
        <p>World Facts</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/180?2">
        <h3>What is hidden under water</h3>
        <p>FactsBySri</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/180?3">
        <h3>Ideal</h3>
        <p>srishti</p>
      </div>

    </div>

  </div>

</body>
</html>

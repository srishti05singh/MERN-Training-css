<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Positions</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 150vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .container{
            width: 60%;
            height: 300px;
            border: 3px solid black;

            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .box{
            width: 100px;
            height: 100px;
            color: white;
            font-size: 24px;
            font-weight: bold;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box1{ background-color: crimson; }
        .box2{ background-color: green; }
        .box3{ background-color: orange; }
        .box4{ background-color: purple; }

        
        .outside-box{
            width: 100px;
            height: 100px;
            background-color: black;
            color: white;
            font-size: 24px;

            display: flex;
            justify-content: center;
            align-items: center;

            position: fixed;
            bottom: 0;
            right: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
    </div>

    
    <div class="outside-box">5</div>

</body>
</html>

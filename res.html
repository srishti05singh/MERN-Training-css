<!DOCTYPE html>
<html>
<head>
    <title>Inline Flex Example</title>
    <style>
        .container{
            display: inline-flex;
            gap: 10px;
            border: 2px solid black;
            padding: 10px;
        }

        .box{
            width: 80px;
            height: 80px;
            background-color: royalblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>

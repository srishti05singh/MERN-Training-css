<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move Around Square</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f4f4;
}

.container{
    width:400px;
    height:400px;
    border:4px solid black;
    position:relative;
}

.box{
    width:80px;
    height:80px;
    background:royalblue;
    position:absolute;

    animation:moveSquare 20s linear infinite;
}

@keyframes moveSquare{

  
    0%{
        top:0;
        left:0;
    }

  
    25%{
        top:0;
        left:320px;
    }

    50%{
        top:320px;
        left:320px;
    }

   
    75%{
        top:320px;
        left:0;
    }

    100%{
        top:0;
        left:0;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="box"></div>
</div>

</body>
</html>

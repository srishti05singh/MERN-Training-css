<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Example</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .parent {
      width: 100%;
      height: 400px;
      border: 3px solid black;
      margin: 20px auto;
      position: relative; /* needed for absolute positioning */
      text-align: center; /* inline-block alignment */
    }

    .box {
      width: 150px;
      height: 150px;
      border: 2px solid black;
      font-size: 20px;
      font-weight: bold;
      color: black;
      display: inline-block; /* horizontal layout without flex */
      margin: 10px;
      line-height: 150px; /* vertical centering */
    }

    .static   { background-color: blanchedalmond; position: static; }
    .relative { background-color: burlywood; position: relative; top: 10px; left: 10px; }
    .absolute { background-color: blueviolet; position: absolute; top: 50px; left: 50px; }
    .fixed    { background-color: #15f5dc; position: fixed; bottom: 20px; right: 20px; }
    .sticky   { background-color: blue; position: sticky; top: 0; }
  </style>
</head>

<body>

  <div class="parent">
    <div class="box static">Box 1</div>
    <div class="box relative">Box 2</div>
    <div class="box absolute">Box 3</div>
    <div class="box sticky">Box 4</div>
  </div>

  <p style="margin:20px; font-size:18px;">
    Scroll down to see how the <strong>sticky</strong> box stays pinned at the top of the parent container, 
    while the <strong>fixed</strong> box (cyan) stays pinned to the viewport corner.
  </p>

  <!-- Extra content to enable scrolling -->
  <div style="height:1000px;"></div>

  <!-- Fixed box is outside parent so it sticks to viewport -->
  <div class="box fixed">Box 5</div>

</body>
</html>

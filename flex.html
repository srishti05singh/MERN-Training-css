<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Layout</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }
    .container {
      width: 800px;
      height: 600px;
      background: black;
      color: white;
      padding: 20px;

      display: flex;
      flex-direction: column;
      justify-content: center;

      position: relative;
      border-radius: 10px;
    }

    .container h1 {
      margin-bottom: 10px;
    }

    .container p {
      color: #ccc;
      line-height: 1.5;
    }

    .chatbox {
      position: absolute;
      right: 15px;
      bottom: 15px;

      background: white;
      color: black;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .chatbox:hover {
      background: #ddd;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome to The Website</h1>
    <p>
      This is a simple website layout created using Flexbox.  
      It helps you understand alignment, positioning, and structure in CSS.
    </p>

    <div class="chatbox">
     💬 Chat
    </div>
  </div>

</body>
</html>
